<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Marketplace — найди всё</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="antialiased">
  <div id="particles-container"></div>

  <!-- Десктопная навигация -->
  <nav class="desktop-nav fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 flex justify-between items-center h-auto sm:h-16 py-2 sm:py-0 flex-wrap">
      <a href="index.html" class="text-xl sm:text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">🏠 Marketplace</a>
      <div class="flex items-center gap-2 sm:gap-4 flex-wrap">
        <a href="create-listing.html" class="text-gray-700 hover:text-indigo-600 font-medium transition text-sm sm:text-base">+ Подать</a>
        <a href="profile.html" class="text-gray-700 hover:text-indigo-600 font-medium transition text-sm sm:text-base">👤 Профиль</a>
        <a href="wallet.html" class="text-gray-700 hover:text-indigo-600 font-medium transition text-sm sm:text-base">💰 Кошелёк</a>
        <a href="login.html" id="login-link" class="text-gray-700 hover:text-indigo-600 font-medium transition text-sm sm:text-base">Войти</a>
        <a href="register.html" id="register-link" class="text-gray-700 hover:text-indigo-600 font-medium transition text-sm sm:text-base">Регистрация</a>
        <span id="user-name" class="hidden font-medium text-gray-900 text-sm sm:text-base"></span>
        <div id="notification-bell" class="hidden relative cursor-pointer text-lg sm:text-xl">
          🔔 <span id="notification-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">0</span>
        </div>
        <button id="logout-btn" class="hidden bg-gray-200 hover:bg-gray-300 px-2 sm:px-3 py-1 rounded-lg text-xs sm:text-sm">Выйти</button>
        <button id="theme-toggle" class="text-lg sm:text-2xl hover:scale-110 transition-transform">🌓</button>
      </div>
    </div>
  </nav>

  <!-- Мобильная нижняя панель (glass-radio-group) -->
  <div class="mobile-nav" style="display: none;">
    <div class="glass-radio-group">
      <input type="radio" id="glass-home" name="mobile-nav" checked>
      <label for="glass-home" onclick="window.location.href='index.html'"><span>🏠</span> Главная</label>

      <input type="radio" id="glass-create" name="mobile-nav">
      <label for="glass-create" onclick="window.location.href='create-listing.html'"><span>➕</span> Подать</label>

      <input type="radio" id="glass-wallet" name="mobile-nav">
      <label for="glass-wallet" onclick="window.location.href='wallet.html'"><span>💰</span> Кошелёк</label>

      <input type="radio" id="glass-profile" name="mobile-nav">
      <label for="glass-profile" onclick="window.location.href='profile.html'"><span>👤</span> Профиль</label>

      <div class="glass-glider"></div>
    </div>
  </div>

  <!-- Контент -->
  <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 pt-4 sm:pt-24 pb-8 sm:pb-12">
    <div class="glass p-4 sm:p-6 rounded-2xl shadow-lg mb-6 sm:mb-8 fade-in">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 sm:gap-4">
        <input type="text" id="search-input" placeholder="Что ищете?" class="col-span-1 sm:col-span-2 px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base">
        <select id="category-select" class="px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base">
          <option value="all">Все категории</option>
          <option value="electronics">Электроника</option>
          <option value="clothing">Одежда</option>
          <option value="auto">Авто</option>
          <option value="realty">Недвижимость</option>
          <option value="other">Другое</option>
        </select>
        <input type="number" id="min-price" placeholder="Цена от" class="px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base">
        <input type="number" id="max-price" placeholder="Цена до" class="px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base">
      </div>
      <div class="mt-3 sm:mt-4 flex justify-center">
        <button id="search-btn" class="text-white px-6 sm:px-8 py-2 sm:py-3 rounded-xl font-semibold text-sm sm:text-base w-full sm:w-auto">🔍 Найти</button>
      </div>
    </div>

    <div id="listings-container" class="listings-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
    </div>

    <div id="pagination" class="flex justify-center mt-6 sm:mt-8 gap-1 sm:gap-2 flex-wrap"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.init();
      App.loadListings();
      document.getElementById('search-btn').addEventListener('click', () => App.loadListings(1));
      document.getElementById('search-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') App.loadListings(1);
      });
      const mobileThemeBtn = document.getElementById('theme-toggle-mobile');
      if (mobileThemeBtn) {
        mobileThemeBtn.addEventListener('click', () => App.toggleTheme());
      }
    });

    const isMobile = window.innerWidth < 768;
    const particlesContainer = document.getElementById('particles-container');
    for (let i = 0; i < (isMobile ? 10 : 25); i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      const size = Math.random() * 4 + 1;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
      particle.style.animationDelay = Math.random() * 10 + 's';
      particlesContainer.appendChild(particle);
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    const listingsContainer = document.getElementById('listings-container');
    if (listingsContainer) {
      const cardObserver = new MutationObserver(() => {
        document.querySelectorAll('.listing-card').forEach(card => observer.observe(card));
      });
      cardObserver.observe(listingsContainer, { childList: true, subtree: true });
    }
  </script>
</body>
</html>
