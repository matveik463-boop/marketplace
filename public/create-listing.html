<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Новое объявление — Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="antialiased bg-gray-50">
  <nav class="desktop-nav fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 flex justify-between items-center h-auto sm:h-16 py-2 sm:py-0 flex-wrap">
      <a href="index.html" class="text-xl sm:text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">🏠 Marketplace</a>
      <a href="profile.html" class="text-gray-700 hover:text-indigo-600 font-medium transition text-sm sm:text-base">👤 Профиль</a>
    </div>
  </nav>

  <div class="mobile-nav" style="display: none;">
    <a href="index.html"><span class="icon">🏠</span>Главная</a>
    <a href="create-listing.html" class="active"><span class="icon">➕</span>Подать</a>
    <a href="wallet.html"><span class="icon">💰</span>Кошелёк</a>
    <a href="profile.html"><span class="icon">👤</span>Профиль</a>
  </div>

  <div class="max-w-lg mx-auto px-2 sm:px-4 pt-4 sm:pt-24 pb-8 sm:pb-12">
    <div class="bg-white rounded-2xl shadow-xl p-4 sm:p-6">
      <h2 class="text-xl sm:text-2xl font-bold text-gray-800 mb-4 sm:mb-6">📝 Новое объявление</h2>
      <form id="create-form" enctype="multipart/form-data" class="space-y-3 sm:space-y-4">
        <input type="text" name="title" placeholder="Название" required class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base">
        <textarea name="description" placeholder="Описание" required class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base h-24 sm:h-32"></textarea>
        <input type="number" name="price" placeholder="Цена" step="0.01" required class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base">
        <select name="category" required class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base">
          <option value="" disabled selected>Категория</option>
          <option value="electronics">Электроника</option>
          <option value="clothing">Одежда</option>
          <option value="auto">Авто</option>
          <option value="realty">Недвижимость</option>
          <option value="other">Другое</option>
        </select>
        <select name="condition" class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base">
          <option value="used">Б/у</option>
          <option value="new">Новое</option>
        </select>
        <input type="text" name="location" placeholder="Местоположение" class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base">
        <label class="block">
          <span class="text-gray-700 font-medium text-sm sm:text-base">Фото (до 5)</span>
          <input type="file" name="images" multiple accept="image/*" class="w-full mt-1 sm:mt-2 text-sm sm:text-base">
        </label>
        <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-2 sm:py-3 rounded-xl font-semibold text-sm sm:text-base">Опубликовать</button>
      </form>
      <div id="create-status" class="mt-3 sm:mt-4 text-center"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if (!App.getToken()) window.location.href = 'login.html';
    document.getElementById('create-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const res = await fetch('/api/listings', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + App.getToken() },
        body: formData
      });
      if (res.ok) {
        alert('Объявление создано!');
        window.location.href = 'index.html';
      } else {
        const err = await res.json();
        alert(err.error || 'Ошибка');
      }
    });
  </script>
</body>
</html>
