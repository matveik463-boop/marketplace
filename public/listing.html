<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Объявление — Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="antialiased bg-gray-50">
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
      <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">🏠 Marketplace</a>
      <div class="flex items-center gap-4">
        <a href="wallet.html" class="text-gray-700 hover:text-indigo-600 font-medium transition">💰 Кошелёк</a>
        <a href="profile.html" class="text-gray-700 hover:text-indigo-600 font-medium transition">👤 Профиль</a>
        <div id="notification-bell" class="hidden relative cursor-pointer text-xl">
          🔔 <span id="notification-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">0</span>
        </div>
        <button id="logout-btn" class="hidden bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-lg text-sm">Выйти</button>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-4 pt-24 pb-12">
    <!-- Само объявление -->
    <div class="bg-white rounded-2xl shadow-xl p-6 mb-8">
      <div id="listing-detail"></div>
    </div>

    <!-- Чат -->
    <div class="bg-white rounded-2xl shadow-xl p-6 mb-8">
      <h3 class="text-xl font-bold text-gray-800 mb-4">💬 Чат по объявлению</h3>
      <div id="messages-box" class="h-64 overflow-y-auto border border-gray-200 rounded-xl p-3 mb-4"></div>
      <div class="flex gap-2">
        <textarea id="message-input" placeholder="Сообщение..." class="flex-1 px-4 py-2 rounded-xl border border-gray-200 focus:border-indigo-400 outline-none resize-none"></textarea>
        <button id="send-message-btn" class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-6 py-2 rounded-xl font-semibold hover:shadow-lg transition">Отправить</button>
      </div>
    </div>

    <!-- Отзывы -->
    <div class="bg-white rounded-2xl shadow-xl p-6 mb-8">
      <h3 class="text-xl font-bold text-gray-800 mb-4">⭐ Отзывы о продавце</h3>
      <div id="reviews-list" class="space-y-3"></div>
      <div class="mt-4 flex gap-3 items-end">
        <select id="review-rating" class="px-4 py-2 rounded-xl border border-gray-200 focus:border-indigo-400 outline-none">
          <option value="5">5 звёзд</option>
          <option value="4">4 звезды</option>
          <option value="3">3 звезды</option>
          <option value="2">2 звезды</option>
          <option value="1">1 звезда</option>
        </select>
        <textarea id="review-text" placeholder="Ваш отзыв" class="flex-1 px-4 py-2 rounded-xl border border-gray-200 focus:border-indigo-400 outline-none resize-none"></textarea>
        <button id="submit-review" class="bg-gradient-to-r from-amber-500 to-orange-500 text-white px-6 py-2 rounded-xl font-semibold hover:shadow-lg transition">Оставить отзыв</button>
      </div>
    </div>

    <!-- Эскроу -->
    <div id="escrow-section" class="hidden bg-white rounded-2xl shadow-xl p-6">
      <h3 class="text-xl font-bold text-gray-800 mb-2">🛡️ Статус сделки</h3>
      <div id="escrow-info" class="mb-4"></div>
      <div class="flex gap-3">
        <button id="confirm-escrow" class="hidden bg-gradient-to-r from-green-500 to-emerald-500 text-white px-6 py-2 rounded-xl font-semibold hover:shadow-lg transition">Подтвердить получение</button>
        <button id="cancel-escrow" class="hidden bg-gray-200 hover:bg-gray-300 px-6 py-2 rounded-xl font-semibold transition">Отменить сделку</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
  <script src="listing-logic.js"></script>
</body>
</html>
