<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Вход — Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="antialiased bg-gray-50 flex items-center justify-center min-h-screen px-4">
  <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 w-full max-w-sm">
    <h2 class="text-xl sm:text-2xl font-bold text-gray-800 mb-4 sm:mb-6 text-center">🔐 Вход</h2>
    <form id="login-form" class="space-y-3 sm:space-y-4">
      <input type="email" id="email" placeholder="Email" required class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base">
      <input type="password" id="password" placeholder="Пароль" required class="w-full px-3 sm:px-4 py-2 sm:py-3 rounded-xl border border-gray-200 text-sm sm:text-base">
      <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-2 sm:py-3 rounded-xl font-semibold text-sm sm:text-base">Войти</button>
    </form>
    <p class="text-center mt-3 sm:mt-4 text-gray-600 text-sm sm:text-base">Нет аккаунта? <a href="register.html" class="text-indigo-600 hover:underline">Зарегистрироваться</a></p>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorDiv = document.createElement('div');
    errorDiv.style.cssText = 'color: red; text-align: center; margin-top: 10px; font-size: 14px;';
    form.parentNode.insertBefore(errorDiv, form.nextSibling);

    let countdownInterval = null;

    function startCountdown(seconds) {
      clearInterval(countdownInterval);
      let remaining = seconds;
      const update = () => {
        errorDiv.textContent = `Слишком много попыток. Подождите ${remaining} сек.`;
        if (remaining <= 0) {
          clearInterval(countdownInterval);
          errorDiv.textContent = '';
        }
        remaining--;
      };
      update();
      countdownInterval = setInterval(update, 1000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'index.html';
        } else {
          if (res.status === 429 && data.retryAfter) {
            startCountdown(data.retryAfter);
          } else {
            errorDiv.textContent = data.error || 'Ошибка входа';
            setTimeout(() => { errorDiv.textContent = ''; }, 3000);
          }
        }
      } catch (err) {
        errorDiv.textContent = 'Ошибка соединения';
        setTimeout(() => { errorDiv.textContent = ''; }, 3000);
      }
    });
  </script>
</body>
</html>
