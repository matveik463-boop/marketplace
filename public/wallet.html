<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Кошелёк — Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="antialiased bg-gray-50">
  <nav class="desktop-nav fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 flex justify-between items-center h-auto sm:h-16 py-2 sm:py-0 flex-wrap">
      <a href="index.html" class="text-xl sm:text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">🏠 Marketplace</a>
      <div class="flex items-center gap-2 sm:gap-4 flex-wrap">
        <a href="profile.html" class="text-gray-700 hover:text-indigo-600 font-medium transition text-sm sm:text-base">👤 Профиль</a>
        <button id="logout-btn" class="hidden bg-gray-200 hover:bg-gray-300 px-2 sm:px-3 py-1 rounded-lg text-xs sm:text-sm">Выйти</button>
      </div>
    </div>
  </nav>

  <div class="mobile-nav" style="display: none;">
    <div class="glass-radio-group">
      <input type="radio" id="glass-home" name="mobile-nav">
      <label for="glass-home" onclick="window.location.href='index.html'"><span>🏠</span> Главная</label>

      <input type="radio" id="glass-create" name="mobile-nav">
      <label for="glass-create" onclick="window.location.href='create-listing.html'"><span>➕</span> Подать</label>

      <input type="radio" id="glass-wallet" name="mobile-nav" checked>
      <label for="glass-wallet" onclick="window.location.href='wallet.html'"><span>💰</span> Кошелёк</label>

      <input type="radio" id="glass-profile" name="mobile-nav">
      <label for="glass-profile" onclick="window.location.href='profile.html'"><span>👤</span> Профиль</label>

      <div class="glass-glider"></div>
    </div>
  </div>

  <div class="max-w-lg mx-auto px-2 sm:px-4 pt-4 sm:pt-24 pb-8 sm:pb-12">
    <div class="bg-white rounded-2xl shadow-xl p-4 sm:p-6 mb-4 sm:mb-6 text-center">
      <h2 class="text-xl sm:text-2xl font-bold text-gray-800 mb-2">💰 Мой кошелёк</h2>
      <p class="text-gray-600 text-sm sm:text-base">Баланс</p>
      <p id="balance-amount" class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">0 ₽</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-4 sm:p-6 mb-4 sm:mb-6">
      <label class="text-gray-700 font-medium mb-2 block text-sm sm:text-base">Пополнить вручную</label>
      <div class="flex flex-col sm:flex-row gap-2">
        <input type="number" id="deposit-amount" placeholder="Сумма" class="flex-1 px-3 sm:px-4 py-2 rounded-xl border border-gray-200 text-sm sm:text-base">
        <button id="deposit-btn" class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-4 sm:px-6 py-2 rounded-xl font-semibold text-sm sm:text-base">Пополнить</button>
      </div>
      <div class="mt-3 sm:mt-4 text-center">
        <button id="stripe-btn" class="cir-btn w-full justify-center">
          <svg class="cir-btn__arrow" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.3335 8H12.6668" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8.6665 4L12.6665 8L8.6665 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Пополнить через карту
        </button>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-4 sm:p-6">
      <h3 class="text-lg sm:text-xl font-bold text-gray-800 mb-3 sm:mb-4">📋 История операций</h3>
      <div id="transactions-list" class="space-y-2"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if (!App.getToken()) window.location.href = 'login.html';
    App.init();

    async function loadWallet() {
      const res = await fetch('/api/wallet', { headers: { 'Authorization': 'Bearer ' + App.getToken() } });
      const data = await res.json();
      document.getElementById('balance-amount').textContent = data.balance.toFixed(2) + ' ₽';
      const list = document.getElementById('transactions-list');
      list.innerHTML = data.transactions.length ? data.transactions.map(t => `
        <div class="flex flex-col sm:flex-row justify-between bg-gray-50 p-2 sm:p-3 rounded-xl text-sm sm:text-base">
          <span>${t.type === 'deposit' ? '💵 Пополнение' : t.type === 'purchase' ? '🛒 Покупка' : t.type === 'sale' ? '💰 Продажа' : '↩️ Возврат'}</span>
          <span class="font-semibold">${t.amount.toFixed(2)} ₽</span>
          <span>${t.status === 'pending' ? '⏳' : '✅'}</span>
          <span class="text-gray-500 text-xs sm:text-sm">${new Date(t.createdAt).toLocaleString()}</span>
        </div>
      `).join('') : '<p class="text-gray-400 text-sm">Нет операций</p>';
    }

    document.getElementById('deposit-btn').addEventListener('click', async () => {
      const amount = parseFloat(document.getElementById('deposit-amount').value);
      if (!amount || amount <= 0) return alert('Введите сумму');
      const res = await fetch('/api/wallet/deposit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + App.getToken() },
        body: JSON.stringify({ amount })
      });
      if (res.ok) {
        loadWallet();
        document.getElementById('deposit-amount').value = '';
      } else {
        alert('Ошибка пополнения');
      }
    });

    document.getElementById('stripe-btn').addEventListener('click', async () => {
      const amount = parseFloat(document.getElementById('deposit-amount').value);
      if (!amount || amount <= 0) return alert('Введите сумму');
      const res = await fetch('/api/stripe/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + App.getToken() },
        body: JSON.stringify({ amount })
      });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        alert(data.error || 'Ошибка');
      }
    });

    loadWallet();
  </script>
</body>
</html>
